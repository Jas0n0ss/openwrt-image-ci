# Upstream Check v2
# Monitors upstream repositories for changes and triggers builds
# Uses cleaner API patterns and better caching

name: Check Upstream v2

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  TZ: Asia/Shanghai

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      lede_changed: ${{ steps.compare.outputs.lede_changed }}
      immortalwrt_changed: ${{ steps.compare.outputs.immortalwrt_changed }}
      lede_commit: ${{ steps.fetch.outputs.lede_commit }}
      immortalwrt_commit: ${{ steps.fetch.outputs.immortalwrt_commit }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream commits
        id: fetch
        run: |
          set -euo pipefail

          # Get latest commits from upstream
          LEDE_COMMIT=$(curl -fsSL --retry 3 \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/coolsnowwolf/lede/commits/master" | \
            jq -r '.sha')

          IMMORTAL_COMMIT=$(curl -fsSL --retry 3 \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/immortalwrt/immortalwrt/commits/master" | \
            jq -r '.sha')

          echo "lede_commit=$LEDE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "immortalwrt_commit=$IMMORTAL_COMMIT" >> "$GITHUB_OUTPUT"

          echo "LEDE: ${LEDE_COMMIT:0:8}"
          echo "ImmortalWrt: ${IMMORTAL_COMMIT:0:8}"

      - name: Restore state cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: .upstream-state
          key: upstream-state-${{ github.run_id }}
          restore-keys: upstream-state-

      - name: Compare and determine changes
        id: compare
        run: |
          set -euo pipefail

          mkdir -p .upstream-state

          LEDE_COMMIT="${{ steps.fetch.outputs.lede_commit }}"
          IMMORTAL_COMMIT="${{ steps.fetch.outputs.immortalwrt_commit }}"

          LEDE_CHANGED="false"
          IMMORTAL_CHANGED="false"

          # Check LEDE
          if [ ! -f .upstream-state/lede ] || \
             [ "$(cat .upstream-state/lede 2>/dev/null)" != "$LEDE_COMMIT" ]; then
            LEDE_CHANGED="true"
            echo "LEDE changed: $(cat .upstream-state/lede 2>/dev/null | head -c8) -> ${LEDE_COMMIT:0:8}"
          else
            echo "LEDE unchanged: ${LEDE_COMMIT:0:8}"
          fi

          # Check ImmortalWrt
          if [ ! -f .upstream-state/immortalwrt ] || \
             [ "$(cat .upstream-state/immortalwrt 2>/dev/null)" != "$IMMORTAL_COMMIT" ]; then
            IMMORTAL_CHANGED="true"
            echo "ImmortalWrt changed: $(cat .upstream-state/immortalwrt 2>/dev/null | head -c8) -> ${IMMORTAL_COMMIT:0:8}"
          else
            echo "ImmortalWrt unchanged: ${IMMORTAL_COMMIT:0:8}"
          fi

          echo "lede_changed=$LEDE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "immortalwrt_changed=$IMMORTAL_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Update state
        run: |
          mkdir -p .upstream-state
          echo "${{ steps.fetch.outputs.lede_commit }}" > .upstream-state/lede
          echo "${{ steps.fetch.outputs.immortalwrt_commit }}" > .upstream-state/immortalwrt

      - name: Save state cache
        uses: actions/cache@v4
        with:
          path: .upstream-state
          key: upstream-state-${{ github.run_id }}

  trigger-lede:
    needs: check
    if: needs.check.outputs.lede_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger LEDE build
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-v2.yml/dispatches" \
            -d '{
              "ref": "main",
              "inputs": {
                "source": "lede",
                "device": "all",
                "build_mode": "firmware",
                "enable_release": "false",
                "use_sdk_container": "false",
                "debug_mode": "false"
              }
            }'
          echo "Triggered LEDE build"

  trigger-immortalwrt:
    needs: check
    if: needs.check.outputs.immortalwrt_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger ImmortalWrt build
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-v2.yml/dispatches" \
            -d '{
              "ref": "main",
              "inputs": {
                "source": "immortalwrt",
                "device": "all",
                "build_mode": "firmware",
                "enable_release": "false",
                "use_sdk_container": "false",
                "debug_mode": "false"
              }
            }'
          echo "Triggered ImmortalWrt build"

  notify:
    needs: check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Upstream Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.check.outputs.lede_changed }}" = "true" ]; then
            echo "- LEDE: **Changed** (${{ needs.check.outputs.lede_commit:0:8 }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- LEDE: No changes" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.check.outputs.immortalwrt_changed }}" = "true" ]; then
            echo "- ImmortalWrt: **Changed** (${{ needs.check.outputs.immortalwrt_commit:0:8 }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ImmortalWrt: No changes" >> $GITHUB_STEP_SUMMARY
          fi
