name: Build OpenWrt (LEDE + ImmortalWrt)

on:
  workflow_dispatch:
    inputs:
      source:
        description: "选择源码"
        type: choice
        required: true
        default: immortalwrt
        options:
          - immortalwrt
          - lede

      device:
        description: "设备"
        type: choice
        required: true
        default: all
        options:
          - all
          - ax6000
          - r2s
          - cr660x
          - x86_64
          - raspberrypi-4b

  schedule:
    - cron: "0 20 * * 0"

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  CCACHE_DIR: ~/.ccache
  CCACHE_COMPRESS: "true"
  CCACHE_MAXSIZE: 2G

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
      repo: ${{ steps.out.outputs.repo }}

    steps:
      - id: out
        run: |
          REPO="${{ github.event.inputs.source }}"

          if [ -z "$REPO" ]; then
            REPO="immortalwrt"
          fi

          echo "repo=$REPO" >> $GITHUB_OUTPUT

          if [ "${{ github.event.inputs.device }}" != "all" ]; then
            echo "matrix={\"device\":[\"${{ github.event.inputs.device }}\"]}" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"device\":[\"ax6000\",\"r2s\",\"cr660x\",\"x86_64\",\"raspberrypi-4b\"]}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: ${{ needs.setup.outputs.repo }} ${{ matrix.device }}

    steps:
      ####################################################################
      # Checkout
      ####################################################################
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.setup.outputs.repo }}/${{ needs.setup.outputs.repo }}
          path: src

      ####################################################################
      # Dependencies
      ####################################################################
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext \
            git libssl-dev libelf-dev python3 python3-dev rsync unzip zlib1g-dev \
            file wget subversion patch ccache

      ####################################################################
      # Feeds
      ####################################################################
      - name: Feeds
        run: |
          cd src
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      ####################################################################
      # Load config (关键优化点)
      ####################################################################
      - name: Load config
        run: |
          REPO="${{ needs.setup.outputs.repo }}"
          DEVICE="${{ matrix.device }}"

          CONFIG_PATH="${{ github.workspace }}/configs/${REPO}/${DEVICE}.config"

          if [ ! -f "$CONFIG_PATH" ]; then
            echo "❌ config not found: $CONFIG_PATH"
            exit 1
          fi

          cp "$CONFIG_PATH" src/.config

          cd src
          make defconfig

      ####################################################################
      # Download
      ####################################################################
      - name: Download
        run: |
          cd src
          make download -j8 || make download -j1 V=s

      ####################################################################
      # Build
      ####################################################################
      - name: Build firmware
        run: |
          cd src

          echo "Start: $(date)"
          ccache -z

          make -j$(nproc) || make -j1 V=s

          ccache -s
          echo "End: $(date)"

      ####################################################################
      # Pack
      ####################################################################
      - name: Pack artifacts
        run: |
          cd src
          mkdir -p ../release/${{ matrix.device }}

          find bin/targets -type f \
            \( -name "*.bin" -o -name "*.img.gz" -o -name "*sysupgrade*" \) \
            -exec cp {} ../release/${{ matrix.device }}/ \;

          cd ../release/${{ matrix.device }}
          sha256sum * > sha256.txt 2>/dev/null || true

      ####################################################################
      # Upload
      ####################################################################
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.setup.outputs.repo }}-${{ matrix.device }}
          path: release/${{ matrix.device }}

      ####################################################################
      # Release
      ####################################################################
      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.repo }}-${{ matrix.device }}-${{ github.run_number }}
          name: ${{ needs.setup.outputs.repo }} ${{ matrix.device }}
          files: release/${{ matrix.device }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

