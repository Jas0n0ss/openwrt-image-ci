# SDK-based Build Workflow
# Uses official OpenWrt/ImmortalWrt SDK containers for faster package builds
# Based on openwrt/gh-action-sdk patterns

name: Build Packages (SDK)

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source SDK'
        type: choice
        required: true
        default: immortalwrt
        options:
          - immortalwrt
          - openwrt
      version:
        description: 'SDK Version'
        type: choice
        required: true
        default: openwrt-23.05
        options:
          - openwrt-23.05
          - openwrt-24.10
          - master
          - snapshot
      arch:
        description: 'Target Architecture'
        type: choice
        required: true
        default: x86_64
        options:
          - x86_64
          - aarch64_generic
          - arm_cortex-a7_neon-vfpv4
          - mipsel_24kc
          - mips_24kc
      packages:
        description: 'Packages to build (space-separated, or "all")'
        required: false
        default: 'all'
      release:
        description: 'Create release'
        type: boolean
        required: false
        default: false

  schedule:
    # Monthly package rebuild
    - cron: "0 0 1 * *"

concurrency:
  group: sdk-${{ github.ref_name }}-${{ github.event.inputs.arch || 'x86_64' }}-${{ github.run_number }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  # ============================================================================
  # Setup - Determine SDK configuration
  # ============================================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      sdk_image: ${{ steps.config.outputs.sdk_image }}
      arch: ${{ steps.config.outputs.arch }}
      packages: ${{ steps.config.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - name: SDK configuration
        id: config
        run: |
          SOURCE="${{ github.event.inputs.source || 'immortalwrt' }}"
          VERSION="${{ github.event.inputs.version || 'openwrt-23.05' }}"
          ARCH="${{ github.event.inputs.arch || 'x86_64' }}"
          PACKAGES="${{ github.event.inputs.packages || 'all' }}"

          case "$SOURCE" in
            immortalwrt)
              SDK_IMAGE="immortalwrt/sdk:${VERSION}-${ARCH}"
              ;;
            openwrt)
              SDK_IMAGE="openwrt/sdk:${VERSION}-${ARCH}"
              ;;
          esac

          echo "sdk_image=$SDK_IMAGE" >> "$GITHUB_OUTPUT"
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

          echo "SDK: $SDK_IMAGE"
          echo "Arch: $ARCH"
          echo "Packages: $PACKAGES"

  # ============================================================================
  # Build using SDK container
  # ============================================================================
  build:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.sdk_image }}
      options: --user root
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add feeds
        run: |
          # Add custom feed for this repo
          echo "src-build packages ${{ github.workspace }}" >> feeds.conf

          # Add PassWall feeds
          echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main" >> feeds.conf
          echo "src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main" >> feeds.conf

          ./scripts/feeds update -a

      - name: Install packages
        run: |
          ./scripts/feeds install -a -p passwall_packages || true
          ./scripts/feeds install -a -p passwall_luci || true

      - name: Build packages
        run: |
          PACKAGES="${{ needs.setup.outputs.packages }}"

          # Update and install feeds
          make defconfig

          # Build specified packages
          if [ "$PACKAGES" = "all" ]; then
            make package/compile -j$(nproc) || make package/compile -j1 V=s
          else
            for pkg in $PACKAGES; do
              make package/$pkg/compile -j$(nproc) || make package/$pkg/compile -j1 V=s
            done
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find bin/packages -name "*.ipk" -o -name "*.apk" 2>/dev/null | \
            xargs -I{} cp {} artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ needs.setup.outputs.arch }}
          path: artifacts/*
          retention-days: 30

      - name: Create release
        if: github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sdk-${{ needs.setup.outputs.arch }}-${{ github.run_number }}
          name: SDK Build ${{ needs.setup.outputs.arch }} #${{ github.run_number }}
          files: artifacts/*
