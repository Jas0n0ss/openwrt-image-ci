# OpenWrt/LEDE Firmware Builder v2
# Modernized workflow based on openwrt/gh-action-sdk patterns
# Features: composite actions, better caching, flexible inputs, SDK container support

name: Build Firmware v2

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source repository'
        type: choice
        required: true
        default: immortalwrt
        options:
          - immortalwrt
          - lede
      device:
        description: 'Device to build (all = matrix build)'
        type: choice
        required: true
        default: all
        options:
          - all
          - xiaomi-ax3600
          - xiaomi-ax9000
          - xiaomi-wr30u
          - xiaomi-ax6000
          - redmi-ax6000
          - phicomm-k2p
          - xiaomi-3g
          - xiaomi-cr660x
          - r2s
          - x86_64
          - raspberrypi-4b
      build_mode:
        description: 'Build mode'
        type: choice
        required: true
        default: firmware
        options:
          - firmware
          - toolchain-only
      enable_release:
        description: 'Create GitHub release'
        type: boolean
        required: false
        default: false
      use_sdk_container:
        description: 'Use SDK container (faster, smaller)'
        type: boolean
        required: false
        default: false
      debug_mode:
        description: 'Debug mode (verbose, fail-fast disabled)'
        type: boolean
        required: false
        default: false

  schedule:
    # Weekly build of all ImmortalWrt devices
    - cron: "0 20 * * 0"

concurrency:
  group: |
    ${{ github.workflow }}-
    ${{ github.ref_name }}-
    ${{ github.event.inputs.source || 'immortalwrt' }}-
    ${{ github.event.inputs.device || 'all' }}-
    ${{ github.run_number }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

env:
  TZ: Asia/Shanghai
  CCACHE_DIR: ~/.ccache
  CCACHE_COMPRESS: 'true'
  CCACHE_COMPRESSLEVEL: '6'
  CCACHE_MAXSIZE: '10G'
  SRC_DIR: src

jobs:
  # ============================================================================
  # Phase 1: Setup - Resolve build matrix and validate configuration
  # ============================================================================
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.json }}
      matrix-empty: ${{ steps.matrix.outputs.empty }}
      repo: ${{ steps.source.outputs.repo }}
      upstream: ${{ steps.source.outputs.upstream }}
      build_mode: ${{ steps.config.outputs.build_mode }}
      enable_release: ${{ steps.config.outputs.enable_release }}
      use_container: ${{ steps.config.outputs.use_container }}
      debug_mode: ${{ steps.config.outputs.debug_mode }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve source configuration
        id: source
        run: |
          set -euo pipefail
          SOURCE="${{ github.event.inputs.source || 'immortalwrt' }}"

          case "$SOURCE" in
            lede)
              echo "repo=lede" >> "$GITHUB_OUTPUT"
              echo "upstream=coolsnowwolf/lede" >> "$GITHUB_OUTPUT"
              ;;
            immortalwrt)
              echo "repo=immortalwrt" >> "$GITHUB_OUTPUT"
              echo "upstream=immortalwrt/immortalwrt" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ERROR: Unknown source: $SOURCE" >&2
              exit 1
              ;;
          esac

      - name: Build configuration
        id: config
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"

          # Determine build mode
          if [ "$EVENT_NAME" = "schedule" ]; then
            echo "build_mode=firmware" >> "$GITHUB_OUTPUT"
            echo "enable_release=false" >> "$GITHUB_OUTPUT"
            echo "use_container=false" >> "$GITHUB_OUTPUT"
            echo "debug_mode=false" >> "$GITHUB_OUTPUT"
          else
            echo "build_mode=${{ github.event.inputs.build_mode || 'firmware' }}" >> "$GITHUB_OUTPUT"
            echo "enable_release=${{ github.event.inputs.enable_release || 'false' }}" >> "$GITHUB_OUTPUT"
            echo "use_container=${{ github.event.inputs.use_sdk_container || 'false' }}" >> "$GITHUB_OUTPUT"
            echo "debug_mode=${{ github.event.inputs.debug_mode || 'false' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix
        id: matrix
        run: |
          set -euo pipefail
          DEVICE_INPUT="${{ github.event.inputs.device || 'all' }}"
          SOURCE="${{ github.event.inputs.source || 'immortalwrt' }}"

          # Read all devices
          mapfile -t ALL_DEVICES < <(sed 's/#.*//' configs/devices.list | xargs -n1 | grep -v '^$')

          # Select devices to build
          if [ "$DEVICE_INPUT" = "all" ]; then
            BUILD_DEVICES=("${ALL_DEVICES[@]}")
          else
            # Validate single device
            valid=false
            for d in "${ALL_DEVICES[@]}"; do
              if [ "$d" = "$DEVICE_INPUT" ]; then
                valid=true
                break
              fi
            done
            if [ "$valid" = "false" ]; then
              echo "ERROR: Unknown device: $DEVICE_INPUT" >&2
              exit 1
            fi
            BUILD_DEVICES=("$DEVICE_INPUT")
          fi

          # Validate configs exist
          for dev in "${BUILD_DEVICES[@]}"; do
            cfg="configs/${SOURCE}/${dev}.config"
            if [ ! -f "$cfg" ]; then
              echo "ERROR: Missing config: $cfg" >&2
              exit 1
            fi
          done

          # Build JSON matrix
          json=$(printf '{"device":"%s"},' "${BUILD_DEVICES[@]}")
          json="[${json%,}]"

          echo "json={\"include\":$json}" >> "$GITHUB_OUTPUT"
          echo "empty=false" >> "$GITHUB_OUTPUT"
          echo "Devices to build: ${BUILD_DEVICES[*]}"

  # ============================================================================
  # Phase 2: Build - Compile firmware for each device in matrix
  # ============================================================================
  build:
    needs: setup
    if: needs.setup.outputs.matrix-empty != 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    strategy:
      fail-fast: ${{ needs.setup.outputs.debug_mode != 'true' }}
      max-parallel: 3
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: ${{ needs.setup.outputs.repo }} › ${{ matrix.device }}

    env:
      REPO: ${{ needs.setup.outputs.repo }}
      UPSTREAM: ${{ needs.setup.outputs.upstream }}
      BUILD_MODE: ${{ needs.setup.outputs.build_mode }}

    outputs:
      ${{ matrix.device }}-status: ${{ job.status }}

    steps:
      # -------------------------------------------------------------------------
      # Checkout
      # -------------------------------------------------------------------------
      - name: Checkout builder
        uses: actions/checkout@v4

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM }}
          ref: master
          path: ${{ env.SRC_DIR }}
          fetch-depth: 1

      # -------------------------------------------------------------------------
      # Cache setup (key includes source hash for invalidation)
      # -------------------------------------------------------------------------
      - name: Cache keys
        id: cache-keys
        run: |
          echo "dl-key=dl-${{ env.REPO }}-v2-${{ hashFiles('configs/**', '.github/workflows/build-v2.yml') }}" >> "$GITHUB_OUTPUT"
          echo "feeds-key=feeds-${{ env.REPO }}-v2-${{ hashFiles('.github/actions/setup-feeds/**', 'scripts/**') }}" >> "$GITHUB_OUTPUT"
          echo "ccache-key=ccache-${{ env.REPO }}-${{ matrix.device }}-${{ hashFiles('configs/**/common.config') }}" >> "$GITHUB_OUTPUT"

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.SRC_DIR }}/dl
          key: ${{ steps.cache-keys.outputs.dl-key }}
          restore-keys: dl-${{ env.REPO }}-

      - name: Cache feeds
        uses: actions/cache@v4
        with:
          path: ${{ env.SRC_DIR }}/feeds
          key: ${{ steps.cache-keys.outputs.feeds-key }}
          restore-keys: feeds-${{ env.REPO }}-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ steps.cache-keys.outputs.ccache-key }}-${{ github.run_id }}
          restore-keys: |
            ${{ steps.cache-keys.outputs.ccache-key }}-
            ccache-${{ env.REPO }}-${{ matrix.device }}-
            ccache-${{ env.REPO }}-

      # -------------------------------------------------------------------------
      # Environment setup
      # -------------------------------------------------------------------------
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo apt-get purge -y azure-cli || true
          sudo docker image prune -af 2>/dev/null || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext \
            git libssl-dev libelf-dev python3 python3-dev python3-distutils \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl ccache \
            ecj fastjar java-propose-classpath \
            libncurses5-dev libncursesw5-dev libz-dev \
            curl cmake jq rename tar

      - name: Configure git
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 300
          git config --global core.compression 0

      # -------------------------------------------------------------------------
      # Feed setup (composite action)
      # -------------------------------------------------------------------------
      - name: Setup feeds and packages
        uses: ./.github/actions/setup-feeds
        with:
          repo: ${{ env.REPO }}
          device: ${{ matrix.device }}
          config-root: ${{ github.workspace }}/configs

      # -------------------------------------------------------------------------
      # Prepare firmware overlay files
      # -------------------------------------------------------------------------
      - name: Prepare overlay files
        run: |
          bash scripts/generate-banner.sh "${{ env.REPO }}" files
          bash scripts/bundle-oh-my-bash.sh files
          bash scripts/install-files-overlay.sh "${{ env.SRC_DIR }}" files

      # -------------------------------------------------------------------------
      # Generate and sanitize .config
      # -------------------------------------------------------------------------
      - name: Generate configuration
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail

          DEVICE_CFG="${{ github.workspace }}/configs/${{ env.REPO }}/${{ matrix.device }}.config"
          COMMON_CFG="${{ github.workspace }}/configs/${{ env.REPO }}/common.config"
          CUSTOM_CFG="${{ github.workspace }}/configs/custom-plugins.config"

          # Merge configs
          cat "$DEVICE_CFG" > .config
          cat "$COMMON_CFG" >> .config
          cat "$CUSTOM_CFG" >> .config

          # Add snippets
          for snip in \
            "${{ github.workspace }}/configs/snippets/wireless-core.config" \
            "${{ github.workspace }}/configs/snippets/luci-zh-cn.config" \
            "${{ github.workspace }}/configs/snippets/no-rust-passwall.config" \
            "${{ github.workspace }}/configs/snippets/no-selinux.config"; do
            [ -f "$snip" ] && cat "$snip" >> .config
          done

          # Add dev settings
          echo -e "\nCONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config

          # Sanitize: Remove Kconfig cycle triggers
          sed -i \
            -e '/^CONFIG_PACKAGE_dnsmasq-full=y$/d' \
            -e '/^CONFIG_PACKAGE_dnsmasq_full_/d' \
            -e '/^CONFIG_PACKAGE_nftables-json=y$/d' \
            -e '/^CONFIG_PACKAGE_nftables-nojson=y$/d' \
            -e '/^CONFIG_PACKAGE_luci-app-turboacc/d' \
            -e '/^CONFIG_PACKAGE_kmod-nft-fullcone=y$/d' \
            -e '/^CONFIG_PACKAGE_kmod-nft-offload=y$/d' \
            -e '/^CONFIG_PACKAGE_kmod-tcp-bbr=y$/d' \
            .config

          # Add explicit disables
          {
            echo -e "\n# Kconfig cycle guards"
            echo "# CONFIG_PACKAGE_dnsmasq-full is not set"
            echo "# CONFIG_PACKAGE_dnsmasq_full_nftset is not set"
            echo "# CONFIG_PACKAGE_nftables-json is not set"
            echo "# CONFIG_PACKAGE_nftables-nojson is not set"
          } >> .config

          echo "==> Configuration generated"

      # -------------------------------------------------------------------------
      # Defconfig with TurboACC handling
      # -------------------------------------------------------------------------
      - name: Defconfig and enable TurboACC
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail

          STASH_DIR=".ci-stash"
          RESTORED=0

          cleanup() {
            if [ "$RESTORED" -eq 0 ]; then
              for pkg in luci-app-turboacc nft-fullcone; do
                [ -d "$STASH_DIR/$pkg" ] || continue
                rm -rf "package/$pkg"
                mv "$STASH_DIR/$pkg" "package/$pkg"
              done
            fi
          }
          trap cleanup EXIT

          # Stash TurboACC packages
          mkdir -p "$STASH_DIR"
          for pkg in luci-app-turboacc nft-fullcone; do
            if [ -d "package/$pkg" ]; then
              rm -rf "$STASH_DIR/$pkg"
              mv "package/$pkg" "$STASH_DIR/$pkg"
            fi
          done

          # Run defconfig
          make defconfig > defconfig.log 2>&1 || { cat defconfig.log; exit 1; }

          if grep -q 'recursive dependency detected' defconfig.log; then
            echo "ERROR: Kconfig cycle detected" >&2
            exit 1
          fi

          # Restore TurboACC
          for pkg in luci-app-turboacc nft-fullcone; do
            [ -d "$STASH_DIR/$pkg" ] || continue
            rm -rf "package/$pkg"
            mv "$STASH_DIR/$pkg" "package/$pkg"
          done
          RESTORED=1

          # Verify TurboACC exists
          [ -f package/luci-app-turboacc/Makefile ] || { echo "ERROR: TurboACC missing"; exit 1; }
          [ -f package/nft-fullcone/Makefile ] || { echo "ERROR: nft-fullcone missing"; exit 1; }

          # Patch TurboACC defaults
          if ! grep -q 'ci-patched' package/luci-app-turboacc/Makefile; then
            sed -i \
              -e '/INCLUDE_OFFLOADING/,/^config /{ s/^[[:space:]]*default y.*/\tdefault n # ci-patched/; }' \
              -e '/INCLUDE_NFT_FULLCONE/,/^config /{ s/^[[:space:]]*default y[[:space:]]*$/\tdefault n # ci-patched/; }' \
              -e '/INCLUDE_BBR_CCA/,/^config /{ s/^[[:space:]]*default y[[:space:]]*$/\tdefault n # ci-patched/; }' \
              package/luci-app-turboacc/Makefile
          fi

          # Add TurboACC to config
          cat "${{ github.workspace }}/configs/snippets/turboacc.config" >> .config

          # Enable via direct config edits
          sed -i \
            -e '/^CONFIG_PACKAGE_luci-app-turboacc.*/d' \
            -e '/^CONFIG_PACKAGE_kmod-nft-fullcone=y$/d' \
            -e '/^CONFIG_PACKAGE_kmod-tcp-bbr=y$/d' \
            -e '/^CONFIG_PACKAGE_kmod-nft-offload=y$/d' \
            -e '/^# CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING/d' \
            .config

          {
            echo "CONFIG_PACKAGE_kmod-nft-fullcone=y"
            echo "CONFIG_PACKAGE_kmod-tcp-bbr=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_BBR_CCA=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_NFT_FULLCONE=y"
            echo "# CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING is not set"
          } >> .config

          # Final oldconfig
          make oldconfig > oldconfig.log 2>&1 || { cat oldconfig.log; exit 1; }

          if grep -q 'recursive dependency detected' oldconfig.log; then
            echo "ERROR: Kconfig cycle after TurboACC" >&2
            exit 1
          fi

          echo "==> Defconfig complete, TurboACC enabled"

      # -------------------------------------------------------------------------
      # Compile
      # -------------------------------------------------------------------------
      - name: Compile firmware
        if: env.BUILD_MODE == 'firmware'
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail

          export PATH="/usr/lib/ccache:$PATH"
          ulimit -n 65535 2>/dev/null || true

          echo "==> Starting build for ${{ matrix.device }}"
          ccache -s 2>/dev/null || true

          # Download sources
          make download -j16 || make download -j8 || make download -j4

          # Build toolchain for ImmortalWrt
          if [ "${{ env.REPO }}" = "immortalwrt" ]; then
            echo "==> Building toolchain"
            make toolchain/compile -j"$(nproc)" || make toolchain/compile -j1 V=s
          fi

          # Main build
          if ! make -j"$(nproc)"; then
            echo "==> Parallel build failed, retrying with -j1..."
            make -j1 V=s
          fi

          ccache -s 2>/dev/null || true
          echo "==> Build complete"

      - name: Compile toolchain only
        if: env.BUILD_MODE == 'toolchain-only'
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          export PATH="/usr/lib/ccache:$PATH"
          make toolchain/compile -j"$(nproc)" || make toolchain/compile -j1 V=s
          echo "==> Toolchain build complete"

      # -------------------------------------------------------------------------
      # Pack and upload
      # -------------------------------------------------------------------------
      - name: Pack firmware
        if: env.BUILD_MODE == 'firmware'
        id: pack
        uses: ./.github/actions/pack-release
        with:
          device: ${{ matrix.device }}
          repo: ${{ env.REPO }}
          config-file: ${{ github.workspace }}/configs/${{ env.REPO }}/${{ matrix.device }}.config
          source-dir: ${{ env.SRC_DIR }}
          output-dir: ./release/${{ matrix.device }}
          version: ${{ github.run_number }}

      - name: Upload artifact
        if: env.BUILD_MODE == 'firmware'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.REPO }}-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7
          if-no-files-found: error

      # -------------------------------------------------------------------------
      # Debug on failure
      # -------------------------------------------------------------------------
      - name: Upload debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ env.REPO }}-${{ matrix.device }}-${{ github.run_id }}
          path: |
            ${{ env.SRC_DIR }}/defconfig.log
            ${{ env.SRC_DIR }}/oldconfig.log
            ${{ env.SRC_DIR }}/.config
            ${{ env.SRC_DIR }}/.config.old
          retention-days: 3
          if-no-files-found: ignore

  # ============================================================================
  # Phase 3: Release - Create GitHub release with all artifacts
  # ============================================================================
  release:
    needs: [setup, build]
    if: needs.setup.outputs.enable_release == 'true' && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: firmware-${{ needs.setup.outputs.repo }}-*

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/firmware-${{ needs.setup.outputs.repo }}-*/; do
            [ -d "$dir" ] || continue
            cp -a "$dir"/* release/ 2>/dev/null || true
          done
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.repo }}-${{ github.run_number }}
          name: ${{ needs.setup.outputs.repo }} Build ${{ github.run_number }}
          body: |
            ## Firmware Build ${{ github.run_number }}

            **Source:** ${{ needs.setup.outputs.upstream }}
            **Build Date:** ${{ github.event.created_at }}

            ### Included Devices
            ${{ join(fromJSON(needs.setup.outputs.matrix).*.device, ', ') }}

            ### Build Info
            - Build Mode: ${{ needs.setup.outputs.build_mode }}
            - Debug Mode: ${{ needs.setup.outputs.debug_mode }}

            ### Files
            See artifacts below for firmware files.
          files: release/*
          fail_on_unmatched_files: false
