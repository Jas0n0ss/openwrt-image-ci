name: 'Pack and Release Firmware'
description: 'Pack firmware artifacts and create releases'

inputs:
  device:
    description: 'Device name'
    required: true
  repo:
    description: 'Repository type (lede or immortalwrt)'
    required: true
  config-file:
    description: 'Path to device config file'
    required: true
  source-dir:
    description: 'Path to source directory with bin/targets'
    required: true
  output-dir:
    description: 'Output directory for packed firmware'
    required: true
    default: './release'
  version:
    description: 'Version string for naming'
    required: false
    default: ''

outputs:
  artifact-path:
    description: 'Path to packed artifact'
    value: ${{ steps.pack.outputs.path }}
  firmware-count:
    description: 'Number of firmware files packed'
    value: ${{ steps.pack.outputs.count }}

runs:
  using: 'composite'
  steps:
    - name: Pack firmware
      id: pack
      shell: bash
      run: |
        set -euo pipefail

        DEVICE="${{ inputs.device }}"
        REPO="${{ inputs.repo }}"
        CONFIG_FILE="${{ inputs.config-file }}"
        SRC_DIR="${{ inputs.source-dir }}"
        OUT_DIR="${{ inputs.output-dir }}"
        VERSION="${{ inputs.version }}"

        # Default version from date if not provided
        [ -n "$VERSION" ] || VERSION="$(date +%Y%m%d)"

        mkdir -p "$OUT_DIR"

        # Extract target and subtarget from config
        TARGET_LINE=$(grep -E '^CONFIG_TARGET_[a-z0-9]+_DEVICE_.*=y$' "$CONFIG_FILE" | head -1)
        if [ -n "$TARGET_LINE" ]; then
          TARGET=$(echo "$TARGET_LINE" | sed -E 's/^CONFIG_TARGET_([a-z0-9]+)_DEVICE_.*/\1/')
        else
          TARGET=$(grep -E '^CONFIG_TARGET_[a-z0-9]+=y$' "$CONFIG_FILE" | head -1 | sed -E 's/^CONFIG_TARGET_([a-z0-9]+)=y/\1/')
        fi

        # Subtarget
        SUBTARGET=$(grep -E "^CONFIG_TARGET_${TARGET}_SUBTARGET_.*=y$" "$CONFIG_FILE" 2>/dev/null | \
          head -1 | sed -E 's/^CONFIG_TARGET_.*SUBTARGET_([a-z0-9_]+)=y$/\1/' | tr '_' '-')
        [ -n "$SUBTARGET" ] || SUBTARGET="generic"

        # Board name from CONFIG_TARGET_..._DEVICE_...
        BOARD=$(grep -E "^CONFIG_TARGET_${TARGET}_DEVICE_.*=y$" "$CONFIG_FILE" 2>/dev/null | \
          head -1 | sed -E 's/^CONFIG_TARGET_.*DEVICE_([a-z0-9_]+)=y$/\1/' | tr '_' '-')

        BIN_DIR="$SRC_DIR/bin/targets/${TARGET}/${SUBTARGET}"

        echo "==> Packing firmware for $DEVICE"
        echo "    Target: $TARGET/$SUBTARGET"
        echo "    Board: $BOARD"
        echo "    Source: $BIN_DIR"

        if [ ! -d "$BIN_DIR" ]; then
          echo "ERROR: Bin directory not found: $BIN_DIR" >&2
          exit 1
        fi

        # Find firmware files
        COUNT=0
        for file in "$BIN_DIR"/*; do
          [ -f "$file" ] || continue

          fname=$(basename "$file")
          ext="${fname##*.}"
          stem="${fname%.*}"

          # Skip unwanted files
          case "$fname" in
            *.buildinfo|*.json|*.sig|sha256sums|profiles.json|config.buildinfo|feeds.buildinfo|packages.buildinfo|version.buildinfo)
              continue ;;
            *-kernel.bin|*-rootfs*|*.elf|*.dtb|*.itb|manifest)
              continue ;;
          esac

          # Determine type
          ftype="factory"
          if [[ "$fname" == *"sysupgrade"* ]]; then
            ftype="sysupgrade"
          elif [[ "$fname" == *"initramfs"* ]] || [[ "$fname" == *"recovery"* ]]; then
            ftype="recovery"
          elif [[ "$fname" == *"sdcard"* ]] || [[ "$fname" == *"img.gz"* ]]; then
            ftype="sdcard"
          fi

          # Build output filename
          if [ -n "$BOARD" ]; then
            newname="Jas0n0ss-${REPO}-${DEVICE}-${BOARD}-${TARGET}-${ftype}.${ext}"
          else
            newname="Jas0n0ss-${REPO}-${DEVICE}-${TARGET}-${ftype}.${ext}"
          fi

          # Handle compound extensions
          if [[ "$stem" == *".tar" ]]; then
            newname="${newname%.tar.gz}.tar.gz"
          fi

          echo "  → $fname → $newname"
          cp -a "$file" "$OUT_DIR/$newname"
          ((COUNT++)) || true
        done

        # Also copy sha256sums if present
        if [ -f "$BIN_DIR/sha256sums" ]; then
          cp -a "$BIN_DIR/sha256sums" "$OUT_DIR/sha256sums-${REPO}-${DEVICE}.txt"
        fi

        echo "Packed $COUNT firmware files"
        echo "path=$OUT_DIR" >> "$GITHUB_OUTPUT"
        echo "count=$COUNT" >> "$GITHUB_OUTPUT"

    - name: Generate build info
      shell: bash
      run: |
        OUT_DIR="${{ inputs.output-dir }}"
        DEVICE="${{ inputs.device }}"
        REPO="${{ inputs.repo }}"

        cat > "$OUT_DIR/info-${REPO}-${DEVICE}.json" << EOF
        {
          "device": "$DEVICE",
          "repo": "$REPO",
          "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "builder": "Jas0n0ss",
          "files": $(ls -1 "$OUT_DIR" | grep -E "Jas0n0ss-${REPO}-${DEVICE}" | jq -R . | jq -s .)
        }
        EOF
