name: 'Setup OpenWrt Feeds'
description: 'Setup feeds, clone custom packages, and prepare build environment'

inputs:
  repo:
    description: 'Repository type (lede or immortalwrt)'
    required: true
  device:
    description: 'Device name'
    required: true
  config-root:
    description: 'Path to configs directory'
    required: true
    default: './configs'
  turboacc-repo:
    description: 'TurboACC repository URL'
    required: false
    default: 'https://github.com/chenmozhijin/turboacc'
  passwall-pkg-repo:
    description: 'PassWall packages repo'
    required: false
    default: 'https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main'
  passwall-luci-repo:
    description: 'PassWall luci repo'
    required: false
    default: 'https://github.com/Openwrt-Passwall/openwrt-passwall.git;main'

runs:
  using: 'composite'
  steps:
    - name: Setup PassWall feeds
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail
        echo "==> Setting up PassWall feeds"

        # Parse repo URLs
        PASSWALL_PKG_URL="${{ inputs.passwall-pkg-repo }}"
        PASSWALL_LUCI_URL="${{ inputs.passwall-luci-repo }}"

        # Extract branch if specified
        if [[ "$PASSWALL_PKG_URL" == *";"* ]]; then
          PKG_BRANCH="${PASSWALL_PKG_URL##*;}"
          PKG_URL="${PASSWALL_PKG_URL%%;*}"
        else
          PKG_BRANCH="main"
          PKG_URL="$PASSWALL_PKG_URL"
        fi

        if [[ "$PASSWALL_LUCI_URL" == *";"* ]]; then
          LUCI_BRANCH="${PASSWALL_LUCI_URL##*;}"
          LUCI_URL="${PASSWALL_LUCI_URL%%;*}"
        else
          LUCI_BRANCH="main"
          LUCI_URL="$PASSWALL_LUCI_URL"
        fi

        # Add feeds
        grep -qF "src-git passwall_packages $PKG_URL" feeds.conf.default 2>/dev/null || \
          echo "src-git passwall_packages $PKG_URL" >> feeds.conf.default
        grep -qF "src-git passwall_luci $LUCI_URL" feeds.conf.default 2>/dev/null || \
          echo "src-git passwall_luci $LUCI_URL" >> feeds.conf.default

    - name: Update feeds
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail
        echo "==> Updating feeds"
        ./scripts/feeds update -a

    - name: Remove conflicting packages
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail
        echo "==> Removing conflicting packages"

        # Remove duplicate feed sources
        rm -rf feeds/luci/luci-app-dae feeds/luci/luci-app-daed 2>/dev/null || true
        find feeds -name '*fchomo*' -type d -exec rm -rf {} + 2>/dev/null || true

        # Remove conflicting TurboACC packages from feeds
        rm -rf feeds/luci/applications/luci-app-turboacc \
               feeds/luci/applications/luci-app-turboacc-chenmozhijin \
               feeds/packages/net/nft-fullcone 2>/dev/null || true

        # Remove kenzok feeds if present
        sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf.default 2>/dev/null || true
        sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf 2>/dev/null || true
        rm -rf feeds/small feeds/kenzo package/feeds/small package/feeds/kenzo 2>/dev/null || true

        # Remove duplicate nftables packages
        while IFS= read -r mk; do
          [ -n "$mk" ] || continue
          case "$mk" in ./dl/*|./build_dir/*|./staging_dir/*) continue ;; esac
          rm -rf "$(dirname "$mk")"
        done < <(grep -RIlE 'PKG_NAME:=(nftables-json|nftables-nojson)' . 2>/dev/null || true)

    - name: Install base feed packages
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail
        echo "==> Installing base feed packages"

        BASE_PACKAGES=(
          maccalc wireless-regdb iw luci-ssl
          luci-i18n-passwall-zh-cn luci-i18n-opkg-zh-cn luci-i18n-ttyd-zh-cn luci-i18n-arpbind-zh-cn
          kmod-mt7615-firmware kmod-mt7915-firmware
          kmod-tcp-bbr
          pcre2 libpcre2 libpcre2-8 libxml2 libunistring
          libev libsodium c-ares libcurl libudns
          boost boost-system boost-program_options boost-date_time
          coreutils coreutils-nohup unzip bc pciutils lm-sensors jq yq
          libpam zoneinfo-all
          luci-compat luci-proto-ipv6 luci-lua-runtime
          ttyd luci-app-ttyd libwebsockets-full libuv libjson-c libcap
          kmod-nft-core kmod-nf-conntrack
          jsonfilter v2ray-geoip v2ray-geosite
          golang
        )

        for pkg in "${BASE_PACKAGES[@]}"; do
          ./scripts/feeds install "$pkg" 2>/dev/null || echo "  skip: ${pkg}"
        done

        # Install PassWall feeds
        ./scripts/feeds install -p passwall_packages 2>/dev/null || true
        ./scripts/feeds install -p passwall_luci 2>/dev/null || true

    - name: Clone custom packages
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail
        echo "==> Cloning custom packages"

        mkdir -p package
        TMPDIR=$(mktemp -d)
        trap 'rm -rf "$TMPDIR"' EXIT

        # MosDNS
        if [ ! -d package/luci-app-mosdns ]; then
          echo "  → MosDNS"
          git clone --depth 1 -b v5 https://github.com/sbwml/luci-app-mosdns "$TMPDIR/mosdns"
          cp -a "$TMPDIR/mosdns/luci-app-mosdns" "$TMPDIR/mosdns/mosdns" "$TMPDIR/mosdns/v2dat" package/
        fi

        # TurboACC
        if [ ! -d package/luci-app-turboacc ] || [ ! -d package/nft-fullcone ]; then
          echo "  → TurboACC"
          rm -rf package/luci-app-turboacc package/nft-fullcone 2>/dev/null || true
          git clone --depth 1 -b luci ${{ inputs.turboacc-repo }} "$TMPDIR/turboacc-luci"
          git clone --depth 1 -b package ${{ inputs.turboacc-repo }} "$TMPDIR/turboacc-pkg"
          cp -a "$TMPDIR/turboacc-luci/luci-app-turboacc" package/
          cp -a "$TMPDIR/turboacc-pkg/nft-fullcone" package/
        fi

        # Aurora Theme
        if [ ! -d package/luci-theme-aurora ]; then
          echo "  → Aurora Theme"
          git clone --depth 1 https://github.com/eamonxg/luci-theme-aurora.git package/luci-theme-aurora
        fi

        # luci-app-arpbind (sparse clone for efficiency)
        if [ ! -d package/luci-app-arpbind ]; then
          echo "  → luci-app-arpbind"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/immortalwrt/luci "$TMPDIR/immortal-luci"
          (cd "$TMPDIR/immortal-luci" && git sparse-checkout set applications/luci-app-arpbind)
          cp -a "$TMPDIR/immortal-luci/applications/luci-app-arpbind" package/
        fi

        # Verify TurboACC
        [ -f package/luci-app-turboacc/Makefile ] || { echo "ERROR: TurboACC luci missing"; exit 1; }
        [ -f package/nft-fullcone/Makefile ] || { echo "ERROR: nft-fullcone missing"; exit 1; }

        echo "==> Custom packages ready"

    - name: Patch feeds (Go version fixes)
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail
        echo "==> Patching feeds for Go version compatibility"

        # Fix xray-core Go version
        for mk in feeds/packages/net/xray-core/Makefile feeds/passwall_packages/xray-core/Makefile; do
          [ -f "$mk" ] || continue
          sed -i 's|PKG_VERSION:=.*|PKG_VERSION:=1.8.24|' "$mk" 2>/dev/null || true
          sed -i 's|PKG_HASH:=.*|PKG_HASH:=skip|' "$mk" 2>/dev/null || true
        done

        # Fix sing-box Go version
        for mk in feeds/packages/net/sing-box/Makefile feeds/passwall_packages/sing-box/Makefile; do
          [ -f "$mk" ] || continue
          sed -i 's|PKG_VERSION:=.*|PKG_VERSION:=1.10.5|' "$mk" 2>/dev/null || true
          sed -i 's|PKG_HASH:=.*|PKG_HASH:=skip|' "$mk" 2>/dev/null || true
        done

    - name: Install config packages
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail
        CONFIG_ROOT="${{ inputs.config-root }}"
        EXTRACT_PKG="${{ github.action_path }}/extract-packages.sh"

        CONFIG_FILES=(
          "$CONFIG_ROOT/lede/common.config"
          "$CONFIG_ROOT/immortalwrt/common.config"
          "$CONFIG_ROOT/custom-plugins.config"
          "$CONFIG_ROOT/snippets/turboacc.config"
        )

        for cfg in "${CONFIG_FILES[@]}"; do
          [ -f "$cfg" ] || continue
          while IFS= read -r pkg; do
            [ -n "$pkg" ] || continue
            case "$pkg" in
              nftables-json|nftables-nojson) continue ;;
              luci-app-turboacc|kmod-nft-fullcone|kmod-nft-offload) continue ;;
            esac
            ./scripts/feeds install "$pkg" 2>/dev/null || echo "  skip: ${pkg}"
          done < <(grep -oE 'CONFIG_PACKAGE_[a-zA-Z0-9_-]+=y' "$cfg" 2>/dev/null | sed 's/CONFIG_PACKAGE_//' || true)
        done

        echo "==> Feed setup complete"
